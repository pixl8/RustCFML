name: Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            folder: macos/x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            folder: macos/aarch64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            folder: linux/x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            folder: linux/aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p rustcfml-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.folder }}
          path: target/release/rustcfml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mkdir -p release
          for folder in macos/x86_64 macos/aarch64 linux/x86_64 linux/aarch64; do
            name="rustcfml-$(echo $folder | tr '/' '-')"
            cp "artifacts/${folder}/rustcfml" "release/${name}"
            chmod +x "release/${name}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
